# Public, non-secret backup configuration for gcp2.
# This file must contain only paths, excludes, and the age public recipient.

CONFIG_HOST_ID="gcp2"
AGE_RECIPIENT="age1zm8fkq6wk0j0x40dqwcl6lap9sj0jh0xx8xdvtx49y4sv6s4gftqz440sj"

BACKUP_PATHS=(
  # Host identity and fixed hostname resolution.
  "/etc/hostname"
  "/etc/hosts"

  # CLIProxyAPI: service config, compose file, and credential store.
  "/home/xwzy/CLIProxyAPI/config.yaml"
  "/home/xwzy/CLIProxyAPI/config.yaml.before-password-change-20260617T132709Z"
  "/home/xwzy/CLIProxyAPI/docker-compose.yml"
  "/home/xwzy/CLIProxyAPI/auths"

  # Proxy compose rollback copies created during proxy reconfiguration.
  "/home/xwzy/compose-backups-proxy-20260617T131500Z"

  # Nginx Proxy Manager: proxy database/config and certificates.
  "/home/xwzy/npm/docker-compose.yml"
  "/home/xwzy/npm/data"
  "/home/xwzy/npm/letsencrypt"

  # sing-box: proxy compose and config.
  "/home/xwzy/singbox/docker-compose.yml"
  "/home/xwzy/singbox/config.json"

  # Cloudflare/NPM DDNS automation.
  "/home/xwzy/cf-ddns/.env"
  "/home/xwzy/cf-ddns/state.json"
  "/home/xwzy/cf-ddns/cf_npm_ddns.py"

  # Komari Agent: service unit contains endpoint/token; /opt/komari is small and speeds restore.
  "/etc/systemd/system/komari-agent.service"
  "/opt/komari"
)

TAR_EXCLUDES=(
  "--exclude=**/.git"
  "--exclude=**/.cache"
  "--exclude=**/logs"
  "--exclude=**/*.log"
  "--exclude=**/*.sock"
  "--exclude=**/__pycache__"
  "--exclude=**/*.pyc"
  "--exclude=**/node_modules"

  # Runtime/generated logs and caches are not needed for restore and may contain sensitive request data.
  "--exclude=/home/xwzy/CLIProxyAPI/logs"
  "--exclude=/home/xwzy/npm/data/logs"
  "--exclude=/home/xwzy/npm/tmp"
  "--exclude=/home/xwzy/cf-ddns/ddns.log"
  "--exclude=/home/xwzy/cf-ddns/__pycache__"
)
