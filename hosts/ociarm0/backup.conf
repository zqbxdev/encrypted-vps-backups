# Public, non-secret backup configuration for ociarm0.
# This file must contain only paths, excludes, and the age public recipient.

CONFIG_HOST_ID="ociarm0"
AGE_RECIPIENT="age1zm8fkq6wk0j0x40dqwcl6lap9sj0jh0xx8xdvtx49y4sv6s4gftqz440sj"

BACKUP_PATHS=(
  # Host identity and local service units.
  "/etc/hostname"
  "/etc/hosts"
  "/usr/lib/systemd/system/code-server@.service"

  # code-server configuration and user state. Logs/cache are excluded below.
  "/home/xwzy/.config/code-server"
  "/home/xwzy/.local/share/code-server/User"
  "/home/xwzy/.local/share/code-server/Machine"
  "/home/xwzy/.local/share/code-server/extensions"
  "/home/xwzy/.local/share/code-server/coder.json"
  "/home/xwzy/.local/share/code-server/machineid"
  "/home/xwzy/.local/share/code-server/languagepacks.json"

  # Docker service configs and small persistent data needed for recovery.
  "/home/xwzy/nginx-proxy-manager"
  "/home/xwzy/singbox"
  "/home/xwzy/webchat2api/docker-compose.yml"
  "/home/xwzy/webchat2api/docker-compose.local.yml"
  "/home/xwzy/webchat2api/docker-compose.host.yml"
  "/home/xwzy/webchat2api/data"
  "/home/xwzy/webchat2api-dev/docker-compose.yml"
  "/home/xwzy/webchat2api-dev/data"
  "/home/xwzy/open-webui/docker-compose.yml"

  # Local infra configs that are not guaranteed to live in pushed code repos.
  "/home/xwzy/cloudflare-ddns/.env"
  "/home/xwzy/cloudflare-ddns/state.json"
  "/home/xwzy/cloudflare-ddns/cf_npm_ddns.py"
  "/home/xwzy/workspace/anybridge/.env"
)

TAR_EXCLUDES=(
  "--exclude=**/.git"
  "--exclude=**/node_modules"
  "--exclude=**/.cache"
  "--exclude=**/target"
  "--exclude=**/build"
  "--exclude=**/dist"
  "--exclude=**/__pycache__"
  "--exclude=**/*.pyc"
  "--exclude=**/*.log"
  "--exclude=**/logs"
  "--exclude=**/coder-logs"
  "--exclude=**/*.sock"
)
