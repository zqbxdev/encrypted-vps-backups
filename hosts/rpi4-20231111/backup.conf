# Public, non-secret backup configuration for rpi4-20231111.
# This file must contain only paths, excludes, and the age public recipient.

CONFIG_HOST_ID="rpi4-20231111"
AGE_RECIPIENT="age1zm8fkq6wk0j0x40dqwcl6lap9sj0jh0xx8xdvtx49y4sv6s4gftqz440sj"

BACKUP_PATHS=(
  # Host identity.
  "/etc/hostname"
  "/etc/hosts"

  # System services and package markers needed to restore ingress.
  # cloudflared.service includes a tunnel token; keep it encrypted only.
  "/etc/systemd/system/cloudflared.service"
  "/usr/local/etc/cloudflared"

  # Docker service definitions and recovery notes.
  "/home/xwzy/coder-server/compose.yaml"
  "/home/xwzy/coder-server/OPENCODE_RESTORE_INFO.txt"
  "/home/xwzy/coder-server/CLIPBOARD_FIX_GUIDE.md"
  "/home/xwzy/pi-sing-box-proxy/docker-compose.yml"
  "/home/xwzy/pi-sing-box-proxy/sing-box/config.json"

  # code-server persistent configuration and user settings.
  "/home/xwzy/coder-server/config"
  "/home/xwzy/coder-server/user-data/User"
  "/home/xwzy/coder-server/user-data/Machine"
  "/home/xwzy/coder-server/user-data/coder.json"
  "/home/xwzy/coder-server/user-data/languagepacks.json"
  "/home/xwzy/coder-server/user-data/serve-web-key-half"

  # VS Code extensions are currently small on this Pi; exclude generated caches/logs below.
  "/home/xwzy/coder-server/extensions"

  # opencode durable config/state/data. node_modules/logs are excluded below.
  "/home/xwzy/coder-server/opencode-config"
  "/home/xwzy/coder-server/opencode-data"
  "/home/xwzy/coder-server/opencode-state"

  # Custom clipboard shims used by code-server/opencode terminal workflows.
  "/home/xwzy/coder-server/clipboard-bin"
)

TAR_EXCLUDES=(
  "--exclude=**/.git"
  "--exclude=**/node_modules"
  "--exclude=**/.cache"
  "--exclude=**/logs"
  "--exclude=**/coder-logs"
  "--exclude=**/*.log"
  "--exclude=**/*.sock"
  "--exclude=**/__pycache__"
  "--exclude=**/*.pyc"
  "--exclude=**/CachedExtensionVSIXs"
  "--exclude=**/CachedProfilesData"
  "--exclude=**/clp"

  # Code should be restored from Git remotes, not machine backup.
  "--exclude=/home/xwzy/coder-server/workspace"

  # Rebuildable binary environment; restore via OPENCODE_RESTORE_INFO/custom image.
  "--exclude=/home/xwzy/coder-server/opencode-home"
)
