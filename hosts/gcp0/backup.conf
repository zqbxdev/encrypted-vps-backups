# Public, non-secret backup configuration for gcp0.
# This file must contain only paths, excludes, and the age public recipient.

CONFIG_HOST_ID="gcp0"
AGE_RECIPIENT="age1zm8fkq6wk0j0x40dqwcl6lap9sj0jh0xx8xdvtx49y4sv6s4gftqz440sj"

BACKUP_PATHS=(
  # Host identity and fixed hostname resolution.
  "/etc/hostname"
  "/etc/hosts"

  # CLIProxyAPI: primary service config and credential store.
  "/home/xwzy/CLIProxyAPI/config.yaml"
  "/home/xwzy/CLIProxyAPI/config.yaml.bak.20260616085428"
  "/home/xwzy/CLIProxyAPI/docker-compose.yml"
  "/home/xwzy/CLIProxyAPI/auths"
  "/home/xwzy/CLIProxyAPI/backups"
  "/home/xwzy/CLIProxyAPI/migrations"

  # Nginx Proxy Manager: proxy database/config and certificates.
  "/home/xwzy/nginx-proxy-manager/docker-compose.yml"
  "/home/xwzy/nginx-proxy-manager/data"
  "/home/xwzy/nginx-proxy-manager/letsencrypt"

  # Komari Agent: service unit contains endpoint/token; /opt/komari is small and speeds restore.
  "/etc/systemd/system/komari-agent.service"
  "/opt/komari"

  # Cloudflare/NPM DDNS automation.
  "/etc/systemd/system/cloudflare-npm-ddns.service"
  "/home/xwzy/cloudflare-ddns/.env"
  "/home/xwzy/cloudflare-ddns/state.json"
  "/home/xwzy/cloudflare-ddns/cf_npm_ddns.py"
)

TAR_EXCLUDES=(
  "--exclude=**/.git"
  "--exclude=**/.cache"
  "--exclude=**/logs"
  "--exclude=**/*.log"
  "--exclude=**/*.sock"
  "--exclude=**/__pycache__"
  "--exclude=**/*.pyc"
  "--exclude=**/node_modules"

  # Runtime/generated logs are not needed for restore and may contain sensitive request data.
  "--exclude=/home/xwzy/CLIProxyAPI/logs"
  "--exclude=/home/xwzy/nginx-proxy-manager/logs"
  "--exclude=/home/xwzy/nginx-proxy-manager/tmp"
)
